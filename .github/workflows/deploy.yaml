# -----------------------------------------------------------------------------
# Continuous deploy: build container image, then Terraform apply.
#
# Auth model: GitHub OIDC -> AWS IAM role (secret AWS_ROLE_ARN). Bootstrap that role
# once with a local `terraform apply` before relying on this workflow alone.
# -----------------------------------------------------------------------------

name: Production Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write # Required so GitHub can mint the OIDC token for AWS.
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Exchanges the GitHub OIDC token for AWS STS credentials via the deploy role.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Public image registry for learning; ECR is a good follow-on exercise.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Immutable SHA tag forces a new ECS task definition revision; :latest is a convenience tag.
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-flask-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/my-flask-app:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Apply from terraform/ so paths match the repo layout. TF_VAR_* inject secrets/inputs.
      - name: Terraform Init & Apply
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_image_tag: ${{ github.sha }}
          TF_VAR_github_repository: ${{ github.repository }}
        run: |
          terraform init
          terraform apply -auto-approve
